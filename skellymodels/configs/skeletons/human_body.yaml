# Human body skeleton definition.
#
# Coordinate convention: +X forward, +Y left, +Z up. Right-handed only.
# Origin = proximal end of each rigid body.
#
# Fully-constrained bodies (2 defined axes, 6 DoF):
#   skull, right_hand, left_hand
#
# Under-constrained bodies (1 defined axis, 5 DoF, swing-only):
#   All spine segments, clavicles, limb segments, pelvis, feet
#   2-keypoint bodies get auto-generated frames from the YAML loader.
#   3+ keypoint bodies with 1 axis have extra keypoints for tracking
#   but only one observable axis direction.

name: human_body

rigid_bodies:
  # === Pelvis ===
  # 3 keypoints but nearly coplanar — under-constrained (1 axis).
  # Extra keypoints available for tracking but frame would be unreliable
  # with only hip/sacrum geometry.
  pelvis:
    keypoints:
      - pelvis_spine_sacrum_origin
      - pelvis_right_hip_acetabulum
      - pelvis_left_hip_acetabulum
    origin: pelvis_spine_sacrum_origin
    coordinate_frame:
      origin_keypoints: [pelvis_spine_sacrum_origin]
      y_axis:
        keypoints: [pelvis_left_hip_acetabulum]
        type: exact

  # === Spine (3 segments, bottom to top) ===
  # All 2-keypoint, auto-generated frames by loader.
  spine_lumbar:
    keypoints: [pelvis_spine_sacrum_origin, spine_lumbar_l1]
    origin: pelvis_spine_sacrum_origin

  spine_thoracic:
    keypoints: [spine_lumbar_l1, spine_thoracic_top_t1]
    origin: spine_lumbar_l1

  spine_cervical:
    keypoints: [spine_thoracic_top_t1, skull_origin_foramen_magnum]
    origin: spine_thoracic_top_t1

  # === Skull ===
  # Fully constrained: nose = +X forward (exact), left eye = +Y left (approximate).
  # Z = X × Y = up. Right-handed. ✓
  skull:
    keypoints:
      - skull_origin_foramen_magnum
      - nose_tip
      - right_eye_inner
      - right_eye_center
      - right_eye_outer
      - right_acoustic_meatus
      - right_canine_tooth_tip
      - left_eye_inner
      - left_eye_center
      - left_eye_outer
      - left_acoustic_meatus
      - left_canine_tooth_tip
    origin: skull_origin_foramen_magnum
    coordinate_frame:
      origin_keypoints: [skull_origin_foramen_magnum]
      x_axis:
        keypoints: [nose_tip]
        type: exact
      y_axis:
        keypoints: [left_eye_inner]
        type: approximate

  # === Clavicles (2-keypoint, auto-generated frames) ===
  right_clavicle:
    keypoints: [spine_thoracic_top_t1, right_shoulder]
    origin: spine_thoracic_top_t1

  left_clavicle:
    keypoints: [spine_thoracic_top_t1, left_shoulder]
    origin: spine_thoracic_top_t1

  # === Right arm (2-keypoint segments, auto-generated frames) ===
  right_upper_arm:
    keypoints: [right_shoulder, right_elbow]
    origin: right_shoulder

  right_forearm:
    keypoints: [right_elbow, right_wrist]
    origin: right_elbow

  # Fully constrained: index = +X forward (exact), thumb = approximately +Y left (medial).
  # Z = X × Y = up. ✓
  right_hand:
    keypoints:
      - right_wrist
      - right_index_knuckle
      - right_pinky_knuckle
      - right_thumb_knuckle
    origin: right_wrist
    coordinate_frame:
      origin_keypoints: [right_wrist]
      x_axis:
        keypoints: [right_index_knuckle]
        type: exact
      y_axis:
        keypoints: [right_thumb_knuckle]
        type: approximate

  # === Left arm (2-keypoint segments, auto-generated frames) ===
  left_upper_arm:
    keypoints: [left_shoulder, left_elbow]
    origin: left_shoulder

  left_forearm:
    keypoints: [left_elbow, left_wrist]
    origin: left_elbow

  # Fully constrained: index = +X forward (exact), pinky = approximately +Y left (lateral).
  # Z = X × Y = up. ✓
  left_hand:
    keypoints:
      - left_wrist
      - left_index_knuckle
      - left_pinky_knuckle
      - left_thumb_knuckle
    origin: left_wrist
    coordinate_frame:
      origin_keypoints: [left_wrist]
      x_axis:
        keypoints: [left_index_knuckle]
        type: exact
      y_axis:
        keypoints: [left_pinky_knuckle]
        type: approximate

  # === Right leg (2-keypoint segments, auto-generated frames) ===
  right_thigh:
    keypoints: [pelvis_right_hip_acetabulum, right_knee]
    origin: pelvis_right_hip_acetabulum

  right_shank:
    keypoints: [right_knee, right_ankle]
    origin: right_knee

  # Under-constrained: 3 keypoints but roughly colinear along foot.
  # 1 axis: toe direction = +X forward.
  right_foot:
    keypoints:
      - right_ankle
      - right_heel
      - right_hallux_tip
    origin: right_ankle
    coordinate_frame:
      origin_keypoints: [right_ankle]
      x_axis:
        keypoints: [right_hallux_tip]
        type: exact

  # === Left leg (2-keypoint segments, auto-generated frames) ===
  left_thigh:
    keypoints: [pelvis_left_hip_acetabulum, left_knee]
    origin: pelvis_left_hip_acetabulum

  left_shank:
    keypoints: [left_knee, left_ankle]
    origin: left_knee

  # Under-constrained: 3 keypoints but roughly colinear along foot.
  left_foot:
    keypoints:
      - left_ankle
      - left_heel
      - left_hallux_tip
    origin: left_ankle
    coordinate_frame:
      origin_keypoints: [left_ankle]
      x_axis:
        keypoints: [left_hallux_tip]
        type: exact


linkages:
  sacrum_lumbar:
    parent_rigid_body: pelvis
    child_rigid_bodies: [spine_lumbar]
    shared_keypoint: pelvis_spine_sacrum_origin

  lumbar_thoracic:
    parent_rigid_body: spine_lumbar
    child_rigid_bodies: [spine_thoracic]
    shared_keypoint: spine_lumbar_l1

  # Branching: T1 connects to cervical spine + both clavicles
  thoracic_t1:
    parent_rigid_body: spine_thoracic
    child_rigid_bodies: [spine_cervical, right_clavicle, left_clavicle]
    shared_keypoint: spine_thoracic_top_t1

  cervical_skull:
    parent_rigid_body: spine_cervical
    child_rigid_bodies: [skull]
    shared_keypoint: skull_origin_foramen_magnum

  right_shoulder_joint:
    parent_rigid_body: right_clavicle
    child_rigid_bodies: [right_upper_arm]
    shared_keypoint: right_shoulder

  right_elbow_joint:
    parent_rigid_body: right_upper_arm
    child_rigid_bodies: [right_forearm]
    shared_keypoint: right_elbow

  right_wrist_joint:
    parent_rigid_body: right_forearm
    child_rigid_bodies: [right_hand]
    shared_keypoint: right_wrist

  left_shoulder_joint:
    parent_rigid_body: left_clavicle
    child_rigid_bodies: [left_upper_arm]
    shared_keypoint: left_shoulder

  left_elbow_joint:
    parent_rigid_body: left_upper_arm
    child_rigid_bodies: [left_forearm]
    shared_keypoint: left_elbow

  left_wrist_joint:
    parent_rigid_body: left_forearm
    child_rigid_bodies: [left_hand]
    shared_keypoint: left_wrist

  right_hip_joint:
    parent_rigid_body: pelvis
    child_rigid_bodies: [right_thigh]
    shared_keypoint: pelvis_right_hip_acetabulum

  right_knee_joint:
    parent_rigid_body: right_thigh
    child_rigid_bodies: [right_shank]
    shared_keypoint: right_knee

  right_ankle_joint:
    parent_rigid_body: right_shank
    child_rigid_bodies: [right_foot]
    shared_keypoint: right_ankle

  left_hip_joint:
    parent_rigid_body: pelvis
    child_rigid_bodies: [left_thigh]
    shared_keypoint: pelvis_left_hip_acetabulum

  left_knee_joint:
    parent_rigid_body: left_thigh
    child_rigid_bodies: [left_shank]
    shared_keypoint: left_knee

  left_ankle_joint:
    parent_rigid_body: left_shank
    child_rigid_bodies: [left_foot]
    shared_keypoint: left_ankle


chains:
  axial:
    root_rigid_body: pelvis
    linkages: [sacrum_lumbar, lumbar_thoracic, thoracic_t1, cervical_skull]

  right_arm:
    root_rigid_body: right_clavicle
    linkages: [right_shoulder_joint, right_elbow_joint, right_wrist_joint]

  left_arm:
    root_rigid_body: left_clavicle
    linkages: [left_shoulder_joint, left_elbow_joint, left_wrist_joint]

  right_leg:
    root_rigid_body: right_thigh
    linkages: [right_knee_joint, right_ankle_joint]

  left_leg:
    root_rigid_body: left_thigh
    linkages: [left_knee_joint, left_ankle_joint]
