# https://www.assh.org/handcare/anatomy/joints
# https://en.wikipedia.org/wiki/hand#/media/file:814_Radiograph_of_Hand.jpg

base_name: hand
name_template: "{actor_id}_{left/right}_hand"

keypoints:

  # wrist
  radio_carpal: "Radiocarpal joint, where the distal radius articulates with the proximal row of carpal bones (scaphoid, lunate, triquetrum)"
  mid_carpal: "Midcarpal joint, between the proximal row (scaphoid, lunate, triquetrum) and distal row (trapezium, trapezoid, capitate, hamate) of carpal bones"

  # thumb
  thumb_basal_carpo_metacarpal: "Carpometacarpal joint of the thumb, saddle joint between the trapezium and the base of the first metacarpal"
  thumb_meta_carpo_phalangeal: "Metacarpophalangeal joint of the thumb (thumb knuckle), between the first metacarpal head and the base of the proximal phalanx"
  thumb_inter_phalangeal: "Interphalangeal joint of the thumb, the single hinge joint between the proximal and distal phalanges of the thumb"
  thumb_tip: "Tip of the thumb, most distal point of the distal phalanx"

  # index
  index_finger_carpo_meta_carpal: "Carpometacarpal joint of the index finger, between the trapezoid and the base of the second metacarpal"
  index_finger_meta_carpo_phalangeal: "Metacarpophalangeal joint of the index finger (index knuckle), between the second metacarpal head and the base of the proximal phalanx"
  index_finger_proximal_inter_phalangeal: "Proximal interphalangeal joint of the index finger, hinge joint between the proximal and middle phalanges"
  index_finger_distal_inter_phalangeal: "Distal interphalangeal joint of the index finger, hinge joint between the middle and distal phalanges"
  index_finger_tip: "Tip of the index finger, most distal point of the distal phalanx"

  # middle
  middle_finger_carpo_meta_carpal: "Carpometacarpal joint of the middle finger, between the capitate and the base of the third metacarpal"
  middle_finger_meta_carpo_phalangeal: "Metacarpophalangeal joint of the middle finger (middle knuckle), between the third metacarpal head and the base of the proximal phalanx"
  middle_finger_proximal_inter_phalangeal: "Proximal interphalangeal joint of the middle finger, hinge joint between the proximal and middle phalanges"
  middle_finger_distal_inter_phalangeal: "Distal interphalangeal joint of the middle finger, hinge joint between the middle and distal phalanges"
  middle_finger_tip: "Tip of the middle finger, most distal point of the distal phalanx"

  # ring
  ring_finger_carpo_meta_carpal: "Carpometacarpal joint of the ring finger, between the hamate/capitate and the base of the fourth metacarpal"
  ring_finger_meta_carpo_phalangeal: "Metacarpophalangeal joint of the ring finger (ring knuckle), between the fourth metacarpal head and the base of the proximal phalanx"
  ring_finger_proximal_inter_phalangeal: "Proximal interphalangeal joint of the ring finger, hinge joint between the proximal and middle phalanges"
  ring_finger_distal_inter_phalangeal: "Distal interphalangeal joint of the ring finger, hinge joint between the middle and distal phalanges"
  ring_finger_tip: "Tip of the ring finger, most distal point of the distal phalanx"

  # pinky
  pinky_finger_carpo_meta_carpal: "Carpometacarpal joint of the pinky finger, between the hamate and the base of the fifth metacarpal"
  pinky_finger_meta_carpo_phalangeal: "Metacarpophalangeal joint of the pinky finger (pinky knuckle), between the fifth metacarpal head and the base of the proximal phalanx"
  pinky_finger_proximal_inter_phalangeal: "Proximal interphalangeal joint of the pinky finger, hinge joint between the proximal and middle phalanges"
  pinky_finger_distal_inter_phalangeal: "Distal interphalangeal joint of the pinky finger, hinge joint between the middle and distal phalanges"
  pinky_finger_tip: "Tip of the pinky finger, most distal point of the distal phalanx"
